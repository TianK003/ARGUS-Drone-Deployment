<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ARGUS Swarm Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg-base: #0B0E14;
    --panel-bg: rgba(18, 22, 31, 0.85);
    --panel-border: rgba(45, 55, 72, 0.6);
    --text-primary: #F7FAFC;
    --text-muted: #A0AEC0;
    --accent: #00E676;
    --danger: #FF1744;
    --blur: blur(12px);
    --font-heading: 'Outfit', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }
  
  body, html {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-body);
    overflow: hidden;
  }

  /* Layout configuration: Map takes the whole screen, UI floats over it */
  #map {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
  }
  
  /* Filter the maps out to give a dark, sleek tactical aesthetic */
  .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution {
      filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
  }

  .ui-container {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 420px;
    height: calc(100vh - 40px);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 20px;
    pointer-events: none; /* Let clicks pass through empty spaces between panels */
  }

  .glass-panel {
    background: var(--panel-bg);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    pointer-events: auto; /* Re-enable clicks inside panels */
    display: flex;
    flex-direction: column;
  }

  .header-panel {
    flex-shrink: 0;
  }

  .header-panel h1 {
    font-family: var(--font-heading);
    font-size: 24px;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(135deg, #FFF, #00E676);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .header-panel p {
    margin: 8px 0 0 0;
    font-size: 13px;
    color: var(--text-muted);
  }

  .roster-panel {
    flex-grow: 1;
    overflow: hidden; /* For inner scrolling */
  }

  .roster-panel h2 {
    font-family: var(--font-heading);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin: 0 0 16px 0;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 8px;
  }

  /* List of connected drones */
  .drone-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    height: calc(100% - 35px);
    padding-right: 8px;
  }

  .drone-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px;
    transition: all 0.3s ease;
  }
  
  .drone-card:hover {
    background: rgba(255,255,255,0.08);
    transform: translateX(4px);
  }

  .drone-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .drone-id {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
  }

  .status-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 6px;
    border-radius: 4px;
    background: rgba(0, 230, 118, 0.15);
    color: var(--accent);
    text-transform: uppercase;
  }

  .drone-coords {
    font-family: monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* Video Feeds Container */
  .video-container {
      width: 100%;
      height: 180px;
      backgroundColor: #000;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--panel-border);
  }

  .video-feed {
      width: 100%;
      height: 100%;
      object-fit: cover;
  }

  .video-overlay {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
  }

  /* Prompts Panel */
  .prompt-panel {
      flex-shrink: 0;
  }
  
  .prompt-input-group {
      display: flex;
      gap: 10px;
  }

  .prompt-input-group input {
      flex-grow: 1;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--panel-border);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s;
  }

  .prompt-input-group input:focus {
      outline: none;
      border-color: var(--accent);
  }

  .prompt-input-group button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-heading);
      transition: all 0.3s ease;
  }

  .prompt-input-group button:hover {
      background: rgba(0, 230, 118, 0.1);
  }
  
  .drone-marker {
      background-color: var(--accent);
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
  }
  
  /* Scrollbar custom */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--panel-border);
    border-radius: 10px;
  }

</style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
  <!-- Brand Header -->
  <div class="glass-panel header-panel">
    <h1>ARGUS Swarm</h1>
    <p>Passive Visualization & Orchestration Node</p>
  </div>

  <!-- Dynamic Prompt Command -->
  <div class="glass-panel prompt-panel">
    <div class="prompt-input-group">
      <input type="text" id="samPrompt" placeholder='Target description (e.g. "red sedan")' />
      <button onclick="setPrompt()">Track</button>
    </div>
  </div>

  <!-- Connected Swarm Roster + Video Feeds -->
  <div class="glass-panel roster-panel">
    <h2>Active Swarm (<span id="drone-count">0</span>)</h2>
    <div class="drone-list" id="swarmlist">
      <!-- Drone cards will be injected here via websocket payload -->
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // 1. Map Initialization
  const DEFAULT_CENTER = [46.0569, 14.5058];
  const map = L.map('map', { zoomControl: false }).setView(DEFAULT_CENTER, 15);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  let mapCentered = false;

  // 2. Global State & Visual Layer Arrays
  let droneMarkers = {}; // Leaflet circle markers bounded to uuid
  let dronePaths = {};   // Leaflet polylines bounded to uuid

  const listContainer = document.getElementById('swarmlist');
  const countEl = document.getElementById('drone-count');

  function createDroneCardHtml(drone) {
      // Build the UI card mapping data pushed passively from the edge
      const id = drone.id;
      const lat = (drone.lat || 0).toFixed(5);
      const lng = (drone.lng || 0).toFixed(5);
      
      const batt = drone.telemetry?.batteryLevel || 0;
      const alt = drone.telemetry?.location?.altitude || 0;
      
      return `
        <div class="drone-card" id="card-${id}">
            <div class="drone-card-header">
                <span class="drone-id">${id}</span>
                <span class="status-badge">LIVE</span>
            </div>
            <div class="drone-coords">
               Pos: ${lat}, ${lng} | Alt: ${alt}m | Batt: ${batt}%
            </div>
            <div class="video-container">
                <img src="/api/swarm/${id}/video.mjpg" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23111\\'/><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23555\\' text-anchor=\\'middle\\' font-family=\\'Arial\\'>Waiting for edge feed...</text></svg>'" class="video-feed" alt="Drone Video Feed"/>
                <div class="video-overlay">${id} Edge Stream</div>
            </div>
        </div>
      `;
  }

  // 3. Setup Passive WebSocket Listeners
  function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws/drones`);

      ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          const drones = data.drones || [];
          countEl.innerText = drones.length;
          
          let activeIds = new Set();

          // Evaluate payload
          drones.forEach(d => {
              activeIds.add(d.id);
              
              const c_lat = d.lat || DEFAULT_CENTER[0];
              const c_lng = d.lng || DEFAULT_CENTER[1];

              // Init position if not mapped
              if (!mapCentered) {
                  map.setView([c_lat, c_lng], 16);
                  mapCentered = true;
              }

              // Update or Create the Map Marker
              if (droneMarkers[d.id]) {
                  droneMarkers[d.id].setLatLng([c_lat, c_lng]);
              } else {
                  droneMarkers[d.id] = L.marker([c_lat, c_lng], {
                      icon: L.divIcon({className: 'drone-marker', iconSize: [14, 14]})
                  }).addTo(map);
              }

              // Update or Create the Map Patrol Path line
              if (!dronePaths[d.id] && d.path && d.path.length > 0) {
                  const pts = d.path.map(p => [p.lat, p.lon]);
                  dronePaths[d.id] = L.polyline(pts, {color: 'rgba(0,230,118,0.7)', weight: 2, dashArray: '5,5'}).addTo(map);
              }

              // Update UI Card (Only create if missing so we don't reload the <img> tag)
              let card = document.getElementById(`card-${d.id}`);
              if (!card) {
                  listContainer.insertAdjacentHTML('beforeend', createDroneCardHtml(d));
              } else {
                  // Just update the stats dynamically
                  const batt = d.telemetry?.batteryLevel || 0;
                  const alt = d.telemetry?.location?.altitude || 0;
                  const coordStr = `Pos: ${c_lat.toFixed(5)}, ${c_lng.toFixed(5)} | Alt: ${alt}m | Batt: ${batt}%`;
                  card.querySelector('.drone-coords').innerText = coordStr;
              }
          });

          // Cleanup disconnected drones
          for (const mappedId in droneMarkers) {
              if (!activeIds.has(mappedId)) {
                  map.removeLayer(droneMarkers[mappedId]);
                  delete droneMarkers[mappedId];
                  if (dronePaths[mappedId]) {
                      map.removeLayer(dronePaths[mappedId]);
                      delete dronePaths[mappedId];
                  }
                  let extinctCard = document.getElementById(`card-${mappedId}`);
                  if (extinctCard) extinctCard.remove();
              }
          }
      };

      ws.onclose = () => {
          console.log("WebSocket Disconnected. Reconnecting...");
          setTimeout(connectWs, 2000);
      };
  }

  // Start passive listening
  connectWs();

  function setPrompt() {
      const p = document.getElementById('samPrompt').value;
      if (p) {
          console.log("Setting Master Prompt for server SAM loop:", p);
          // In actual implementation, send this to a global config endpoint
      }
  }

</script>
</body>
</html>
