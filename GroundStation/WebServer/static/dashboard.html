<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ARGUS Hub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg:       #0d1117;
    --panel:    #161b27;
    --panel-2:  #1e2538;
    --panel-3:  #242d45;
    --border:   #263047;
    --border-s: rgba(38,48,71,0.6);
    --text:     #e2e8f5;
    --muted:    #7a96ba;
    --muted-2:  #4e6585;
    --accent:   #3b82f6;
    --accent-h: #2563eb;
    --blue:     #60a5fa;
    --danger:   #f85149;
    --warn:     #f59e0b;
    --mono:     ui-monospace, 'JetBrains Mono', 'Cascadia Code', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 13px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

  /* ── Layout ── */
  #app { display: grid; grid-template-columns: clamp(280px, 33vw, 400px) 1fr; height: 100vh; overflow: hidden; }

  /* ── Map ── */
  #map { height: 100%; background: #c9ced3; }
  #map .leaflet-tile-pane { filter: grayscale(20%) brightness(0.88) contrast(1.05); }
  #map.placement-arm,
  #map.placement-arm .leaflet-grab { cursor: crosshair; }

  /* ── Sidebar ── */
  #side {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100%; overflow: hidden;
  }

  /* ── Header ── */
  #side > header {
    padding: 14px 18px 13px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent 100%);
    flex-shrink: 0;
    position: relative;
  }
  #side > header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
    opacity: 0.4;
  }
  .brand-row { display: flex; align-items: center; gap: 11px; }
  .brand-logo { height: 46px; width: auto; filter: drop-shadow(0 0 8px rgba(59,130,246,0.35)); }
  .brand-name {
    font-size: 15px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text);
    text-shadow: 0 0 20px rgba(59,130,246,0.25);
  }
  .brand-sub { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted-2); margin-top: 1px; }

  /* ── Scrollable body ── */
  #side-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }

  /* ── Sections ── */
  .section { border-bottom: 1px solid var(--border-s); flex-shrink: 0; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 18px; cursor: pointer; user-select: none;
    transition: background 0.12s;
  }
  .section-head:hover { background: var(--panel-2); }
  .section-head h2 {
    margin: 0; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); font-weight: 600;
    display: flex; align-items: center; gap: 7px;
  }
  .section-head .chevron { color: var(--muted-2); font-size: 9px; transition: transform 0.2s ease; }
  .section-head.is-collapsed .chevron { transform: rotate(-90deg); }

  .section-body { padding: 0 16px 14px; }
  .section-body.is-hidden { display: none; }

  .section--static .section-head { cursor: default; pointer-events: none; }

  /* ── Prompt ── */
  #prompt-textarea {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 11px; font-family: inherit; font-size: 12px;
    resize: vertical; min-height: 70px; line-height: 1.55; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #prompt-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  #prompt-textarea::placeholder { color: var(--muted-2); }
  #btn-dispatch {
    width: 100%; margin-top: 8px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 5px;
    padding: 7px 12px; font-size: 12px; cursor: pointer;
    font-family: inherit; font-weight: 600; letter-spacing: 0.04em;
    box-shadow: 0 2px 10px rgba(59,130,246,0.3);
    transition: background 0.15s, box-shadow 0.15s;
  }
  #btn-dispatch:hover {
    background: var(--accent-h);
    box-shadow: 0 4px 16px rgba(59,130,246,0.45);
  }
  #btn-dispatch:active { transform: translateY(1px); }

  /* ── Notifications ── */
  .notif-badge {
    background: var(--warn); color: #000;
    border-radius: 999px; font-size: 10px; font-weight: 700; padding: 1px 6px;
  }
  .notif-badge:empty { display: none; }
  .notif-empty { font-size: 13px; color: var(--muted); padding: 6px 0 4px; }
  .notif-list { list-style: none; margin: 0; padding: 0; max-height: 260px; overflow-y: auto; }
  .notif-item {
    padding: 8px 6px; border-top: 1px solid var(--border-s);
    display: flex; gap: 10px; align-items: baseline; font-size: 14px;
    cursor: pointer; border-radius: 4px;
    transition: background 0.12s;
  }
  .notif-item:hover { background: var(--panel-2); }
  .notif-item:first-child { border-top: none; }
  .notif-ts { color: var(--muted-2); flex-shrink: 0; font-family: var(--mono); font-size: 12px; }
  .notif-drone { color: var(--blue); font-weight: 700; flex-shrink: 0; font-size: 14px; }
  .notif-text { flex: 1; color: var(--text); font-size: 14px; }
  .notif-item.is-warn .notif-text { color: var(--warn); }
  .notif-item.is-alert .notif-text { color: var(--danger); font-weight: 600; }

  /* Expand button inside the Detections section-head */
  .notif-expand {
    background: transparent; color: var(--muted-2);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 0 5px; margin-right: 6px;
    font-size: 11px; cursor: pointer; line-height: 1.4;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
  }
  .notif-expand:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Detections panel (replaces map) ── */
  #detections-panel {
    display: none;
    flex-direction: column;
    background: var(--bg);
    height: 100vh; overflow: hidden;
    min-height: 0;   /* grid child needs this to respect 100vh in some browsers */
  }
  #detections-panel.is-open { display: flex; }
  .det-panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  .det-panel-head h2 {
    margin: 0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text); font-weight: 700;
  }
  .det-panel-head h2 .count {
    color: var(--muted); font-weight: 400; margin-left: 8px; letter-spacing: 0;
    text-transform: none; font-size: 11px;
  }
  .det-close {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: inherit;
    letter-spacing: 0.03em;
    transition: color 0.15s, border-color 0.15s;
  }
  .det-close:hover { color: var(--accent); border-color: var(--accent); }
  .det-panel-body {
    flex: 1 1 0;
    min-height: 0;         /* critical: lets overflow-y actually scroll inside a flex parent */
    overflow-y: auto;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    grid-auto-rows: max-content;   /* rows size to their tallest card and no more */
    gap: 16px;
  }
  .det-empty {
    grid-column: 1 / -1;
    color: var(--muted); font-size: 12px; padding: 20px; text-align: center;
  }

  /* Cards use plain block layout — no flex, no align-self, nothing that can
     cause overlap in a grid row. */
  .det-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    display: block;
  }
  .det-card-head {
    padding: 9px 12px;
    display: flex; align-items: baseline; gap: 8px;
    font-size: 11px;
    border-bottom: 1px solid var(--border-s);
  }
  .det-card-drone { color: var(--blue); font-weight: 700; }
  .det-card-prompt { flex: 1; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .det-card-ts { color: var(--muted-2); font-family: var(--mono); font-size: 10px; }
  .det-card-image {
    display: block; width: 100%; height: 200px;
    background: #060810;
    line-height: 200px; text-align: center;
    color: var(--muted-2); font-size: 11px; letter-spacing: 0.04em;
  }
  .det-card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .det-card-foot {
    padding: 8px 12px;
    display: flex; align-items: center; gap: 8px; font-size: 11px;
    border-top: 1px solid var(--border-s);
  }
  .det-card-foot label {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    color: var(--text); user-select: none;
  }
  .det-card-coords { color: var(--muted); font-family: var(--mono); font-size: 10px; margin-left: auto; }

  /* ── Shared fullscreen lightbox (detections + live stream) ── */
  #lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.94);
    display: none;
    z-index: 9999;
    align-items: center; justify-content: center;
    padding: 40px 40px 60px;
  }
  #lightbox.is-open { display: flex; }
  #lightbox-close {
    position: absolute; top: 18px; right: 24px;
    background: rgba(30,37,56,0.9); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 7px 14px; font-size: 14px; cursor: pointer;
    font-family: inherit;
  }
  #lightbox-close:hover { border-color: var(--accent); color: var(--accent); }
  .lightbox-inner {
    display: flex; flex-direction: column; gap: 14px; align-items: center;
    max-width: 100%; max-height: 100%;
  }
  #lightbox-img {
    max-width: 100%; max-height: calc(100vh - 130px);
    object-fit: contain;
    border-radius: 6px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    background: #060810;
  }
  #lightbox-caption {
    color: var(--text); font-size: 14px; letter-spacing: 0.04em;
    text-align: center; max-width: 900px;
  }

  /* ── Toast stack (bottom-right) ── */
  #toast-stack {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 10000;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
    max-width: 340px;
  }
  .toast {
    background: rgba(20,26,40,0.97); color: var(--text);
    border: 1px solid var(--border); border-left: 3px solid var(--danger);
    border-radius: 6px; padding: 10px 14px;
    font-size: 13px; line-height: 1.45;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    pointer-events: auto;
  }
  .toast.is-visible { opacity: 1; transform: translateY(0); }
  .toast-drone { color: var(--blue); font-weight: 700; margin-right: 8px; }
  .toast-text  { color: var(--text); }

  /* ── Map marker hover preview (detection tooltip) ── */
  .det-preview-tooltip {
    background: rgba(20,26,40,0.97); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px; box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    opacity: 1 !important;
  }
  .det-preview-tooltip::before { display: none; }   /* hide Leaflet's arrow */
  .det-tip-img {
    display: block; width: 220px; height: 124px;
    object-fit: cover; border-radius: 3px; margin-bottom: 5px;
    background: #060810;
  }
  .det-tip-prompt { color: var(--text); font-size: 12px; font-weight: 600; }
  .det-tip-drone { color: var(--blue); font-size: 11px; margin-top: 2px; }

  /* ── Register button ── */
  #btn-register {
    width: 100%; margin-bottom: 10px;
    background: transparent; color: var(--muted);
    border: 1px dashed var(--border); border-radius: 5px;
    padding: 6px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
  }
  #btn-register:hover { color: var(--accent); border-color: var(--accent); border-style: solid; }

  /* ── Drones section body ── */
  #drones-body {
    padding: 10px 10px 14px;
    max-height: calc(100vh - 230px);
    overflow-y: auto;
  }

  /* ── Camera grid: 2 columns ── */
  .empty { padding: 4px 0 2px; color: var(--muted); font-size: 11px; }
  .drone-cameras { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

  .cam-tile {
    background: #060810; border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; aspect-ratio: 16/9; position: relative;
    cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .cam-tile:hover {
    border-color: rgba(59,130,246,0.45);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .cam-tile:hover .cam-expand,
  .cam-tile:hover .cam-delete { opacity: 1; }

  .cam-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .cam-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 6px 4px;
    background: linear-gradient(transparent, rgba(0,0,0,0.88));
    font-size: 9px; color: var(--text);
    display: flex; align-items: center; gap: 4px;
  }
  .cam-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.02em; }

  /* Status dot with pulse for online */
  .cam-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .cam-dot.online  { background: #3fb950; box-shadow: 0 0 4px #3fb950; animation: pulse-dot 2.5s ease-in-out infinite; }
  .cam-dot.offline { background: var(--danger); }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  /* Expand icon */
  .cam-expand {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.7); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 3px;
    padding: 1px 4px; font-size: 9px; cursor: pointer;
    opacity: 0; transition: opacity 0.15s;
    text-decoration: none; line-height: 1.7;
    backdrop-filter: blur(4px);
  }

  .cam-no-signal {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted-2); font-size: 9px; letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Delete button */
  .cam-delete {
    position: absolute; top: 4px; left: 4px;
    background: rgba(248,81,73,0.9); color: #fff;
    border: none; border-radius: 3px;
    padding: 1px 5px; font-size: 9px; cursor: pointer;
    opacity: 0; transition: opacity 0.15s; line-height: 1.7;
    font-family: inherit;
  }

  /* ── Pathing section ── */
  .stripe-dir { display: flex; gap: 5px; margin-top: 7px; }
  .stripe-dir button {
    flex: 1; background: var(--panel-2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 6px; font-size: 11px; cursor: pointer; font-family: inherit;
    transition: border-color 0.13s, color 0.13s;
  }
  .stripe-dir button:hover { border-color: var(--muted-2); color: var(--text); }
  .stripe-dir button.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.08); }
  .path-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin: 5px 0; color: var(--muted); }
  .path-row span:last-child { font-family: var(--mono); font-size: 10px; color: var(--text); }
  .path-hint { font-size: 10px; color: var(--muted-2); line-height: 1.55; margin-top: 8px; border-top: 1px solid var(--border-s); padding-top: 8px; }

  /* ── Leaflet ── */
  .leaflet-tooltip.drone-label {
    background: rgba(13,17,23,0.93); border: 1px solid var(--border);
    color: var(--text); font-size: 10px; padding: 2px 7px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4); border-radius: 4px;
  }
  .leaflet-tooltip.drone-label::before { display: none; }

  /* ── Dialogs ── */
  .hidden { display: none !important; }

  dialog#add-dialog {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 20px 22px; min-width: 310px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }
  dialog#add-dialog::backdrop { background: rgba(0,0,0,0.65); }
  dialog#add-dialog h3 {
    margin: 0 0 14px; font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); font-weight: 600;
  }
  dialog#add-dialog .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 11px; font-size: 12px; }
  dialog#add-dialog label { color: var(--muted); font-size: 10px; letter-spacing: 0.03em; }
  dialog#add-dialog input {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 7px 9px; font-family: inherit; font-size: 12px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  dialog#add-dialog input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  dialog#add-dialog .actions { display: flex; justify-content: flex-end; gap: 7px; margin-top: 12px; }
  dialog#add-dialog .error { color: var(--danger); font-size: 10px; min-height: 14px; }
  dialog button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit;
    transition: background 0.13s, border-color 0.13s;
  }
  dialog button:hover { background: var(--panel-3); border-color: var(--muted-2); }
  dialog button.primary {
    background: var(--accent); color: #fff; border-color: transparent;
    box-shadow: 0 2px 8px rgba(59,130,246,0.3);
  }
  dialog button.primary:hover { background: var(--accent-h); box-shadow: 0 4px 14px rgba(59,130,246,0.45); }
  .hint { font-size: 10px; color: var(--muted); line-height: 1.55; }

  /* ── Place panel ── */
  .place-panel {
    position: fixed; bottom: 24px;
    left: calc(clamp(280px,33vw,400px) + (100vw - clamp(280px,33vw,400px)) / 2);
    transform: translateX(-50%);
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px 12px; min-width: 300px; max-width: 390px;
    z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.6); font-size: 12px;
  }
  .place-panel .row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin: 7px 0; }
  .place-panel .coords { color: var(--muted); font-size: 10px; font-family: var(--mono); }
  .place-panel .actions { display: flex; gap: 7px; margin-top: 12px; }
  .place-panel .actions button {
    flex: 1; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 6px 9px; font-size: 11px; cursor: pointer; font-family: inherit;
    transition: background 0.13s, border-color 0.13s;
  }
  .place-panel .actions button:hover { background: var(--panel-3); border-color: var(--muted-2); }
  .place-panel .actions button.primary {
    background: var(--accent); color: #fff; border-color: transparent;
    box-shadow: 0 2px 8px rgba(59,130,246,0.3);
  }
  .place-panel .actions button.primary:hover { background: var(--accent-h); }
  .place-panel .err { color: var(--danger); font-size: 10px; min-height: 14px; margin-top: 5px; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar (1/3) ── -->
  <aside id="side">
    <header>
      <div class="brand-row">
        <img src="/static/argus_icon.png" class="brand-logo" alt="ARGUS">
        <div>
          <div class="brand-name">ARGUS</div>
          <div class="brand-sub">Multi-Drone Operations</div>
        </div>
      </div>
    </header>

    <div id="side-body">

      <!-- Search prompt -->
      <div class="section section--static">
        <div class="section-head"><h2>Search Target</h2></div>
        <div class="section-body">
          <textarea id="prompt-textarea" rows="3" placeholder="Describe what the swarm should search for…"></textarea>
          <button id="btn-dispatch">Dispatch to swarm</button>
        </div>
      </div>

      <!-- Notifications (collapsible, collapsed by default) -->
      <div class="section">
        <div class="section-head is-collapsed" id="notif-toggle">
          <h2>Detections <span class="notif-badge" id="notif-badge"></span></h2>
          <div style="display:flex; align-items:center; gap:4px;">
            <button id="notif-expand" class="notif-expand" title="Expand detections view">⛶</button>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="section-body is-hidden" id="notif-body">
          <p class="notif-empty" id="notif-empty">No detections yet.</p>
          <ol class="notif-list" id="notif-list"></ol>
        </div>
      </div>

      

      <!-- Drones (collapsible, expanded by default) -->
      <div class="section">
        <div class="section-head" id="drones-toggle">
          <h2>Drones <span id="drone-count" style="color:var(--text);font-weight:700;">0</span></h2>
          <span class="chevron">▾</span>
        </div>
        <div id="drones-body">
          
          <div id="drone-cameras" class="drone-cameras"></div>
          <div id="drone-empty" class="empty hidden">No drones registered.</div>
        </div>
      </div>

    </div>
  </aside>

  <!-- ── Map (2/3) ── -->
  <div id="map"></div>

  <!-- ── Transient toasts (bottom-right) ── -->
  <div id="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <!-- ── Fullscreen lightbox (shared: detection frames + live streams) ── -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
    <button id="lightbox-close" type="button" aria-label="Close (Esc)">Close ✕</button>
    <div class="lightbox-inner">
      <img id="lightbox-img" alt="">
      <div id="lightbox-caption"></div>
    </div>
  </div>

  <!-- ── Expanded detections panel (takes the map slot when open) ── -->
  <section id="detections-panel">
    <header class="det-panel-head">
      <h2>Detections <span class="count" id="det-count">0</span></h2>
      <button id="det-close" class="det-close">Close ✕</button>
    </header>
    <div class="det-panel-body" id="det-body">
      <div class="det-empty" id="det-empty">No detections yet.</div>
    </div>
  </section>
</div>

<!-- ── Register drone dialog ── -->
<dialog id="add-dialog">
  <h3>Register drone</h3>
  <div class="field">
    <label for="reg-id">ID (letters, digits, - _)</label>
    <input id="reg-id" type="text" autocomplete="off" maxlength="40">
  </div>
  <div class="field">
    <label for="reg-label">Label (optional)</label>
    <input id="reg-label" type="text" autocomplete="off" maxlength="60">
  </div>
  <div class="field" style="flex-direction:row;align-items:center;gap:8px;">
    <input id="reg-mock" type="checkbox">
    <label for="reg-mock" style="margin:0;">Mock drone (no real RC)</label>
  </div>
  <div class="field">
    <label for="reg-ip">RC IP address (not needed for mock)</label>
    <input id="reg-ip" type="text" autocomplete="off" placeholder="192.168.1.100">
  </div>
  <p class="hint" style="margin:0 0 6px;">After clicking <b>Pick location</b>, click the map to place this drone.</p>
  <div class="error" id="reg-error"></div>
  <div class="actions">
    <button id="reg-cancel">Cancel</button>
    <button id="reg-save" class="primary">Pick location on map →</button>
  </div>
</dialog>

<!-- ── Placement preview panel ── -->
<div id="place-panel" class="place-panel hidden">
  <div class="row">
    <span style="font-weight:600;" id="place-id">—</span>
    <span class="coords" id="place-coords">—</span>
  </div>
  <div class="row"><span>Coverage radius</span><span><span id="place-reach-val">800</span> m</span></div>
  <input type="range" id="place-reach" min="100" max="10000" step="50" value="800">
  <div class="actions">
    <button id="place-cancel">Cancel</button>
    <button id="place-confirm" class="primary">Register drone</button>
  </div>
  <div class="err" id="place-err"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

const DEFAULT_CENTER = [46.0569, 14.5058];
const PALETTE = ['#3fb950','#58a6ff','#f778ba','#d29922','#a371f7','#ff7b72','#39c5cf','#e3b341','#bc8cff','#56d364'];

// ── Map ───────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView(DEFAULT_CENTER, 14);
map.createPane('pathPane');
map.getPane('pathPane').style.zIndex = 450;

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

const pathLayer = L.layerGroup().addTo(map);

map.on('click', (e) => {
  if (e.originalEvent.target.closest('.leaflet-marker-icon')) return;
  if (typeof window.__argusPlaceClick === 'function') window.__argusPlaceClick(e.latlng);
});

// ── Drone state ───────────────────────────────────────────────────────────
// liveByBackendId: backendId → { marker, sourceId, label, online, color, lat, lng, reach }
const liveByBackendId = new Map();

// ── Path planning ─────────────────────────────────────────────────────────


function addLiveDrone(s, lat, lng) {
  const idx = liveByBackendId.size;
  const color = PALETTE[idx % PALETTE.length];
  const marker = L.circleMarker([lat, lng], { radius: 8, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 }).addTo(map);
  marker.bindTooltip(s.label || s.id, { permanent: true, direction: 'top', offset: [0, -6], className: 'drone-label' });
  const entry = { marker, sourceId: s.id, label: s.label || s.id, online: !!s.online, color, lat, lng, reach: s.reach_m || 800 };
  liveByBackendId.set(s.id, entry);
  return entry;
}

function reconcileLive(snapshots) {
  const seen = new Set();
  for (const s of snapshots) {
    seen.add(s.id);
    const lat = s.lat ?? s.home_lat;
    const lng = s.lng ?? s.home_lng;
    if (lat == null || lng == null) continue;
    const existing = liveByBackendId.get(s.id);
    if (!existing) {
      addLiveDrone(s, lat, lng);
    } else {
      existing.lat = lat; existing.lng = lng;
      existing.label = s.label || s.id;
      existing.online = !!s.online;
      if (s.reach_m) { existing.reach = s.reach_m; }
      existing.marker.setLatLng([lat, lng]);
      existing.marker.setTooltipContent(s.label || s.id);
      // Connect our native backend path rendering to the new UI loop
      if (s.path && s.path.length > 0) {
          const pts = s.path.map(p => [(p.lat || p.latitude), (p.lon || p.longitude)]);
          if (existing.pathLine) {
              existing.pathLine.setLatLngs(pts);
          } else {
              existing.pathLine = L.polyline(pts, {pane: 'pathPane', color: existing.color, weight: 2, dashArray: '5,5'}).addTo(pathLayer);
          }
      } else if (existing.pathLine) {
          map.removeLayer(existing.pathLine);
          existing.pathLine = null;
      }

    }
  }
  // Remove gone drones
  for (const [id, d] of liveByBackendId) {
    if (!seen.has(id)) {
      map.removeLayer(d.marker);
      liveByBackendId.delete(id);
      if (d.pathLine) map.removeLayer(d.pathLine);
    }
  }
  renderList();
  schedulePathUpdate();
}

// ── Delete drone ──────────────────────────────────────────────────────────
async function deleteDrone(sourceId) {
  try {
    const res = await fetch(`/api/drones/${encodeURIComponent(sourceId)}`, { method: 'DELETE' });
    if (!res.ok && res.status !== 404) throw new Error(res.status);
    fetchAndRender();
  } catch (e) {
    console.warn('Delete failed:', e.message);
  }
}

// ── Drone grid (cameras are the list) ────────────────────────────────────
function renderList() {
  const grid = document.getElementById('drone-cameras');
  const emptyEl = document.getElementById('drone-empty');
  const count = liveByBackendId.size;
  document.getElementById('drone-count').textContent = count;

  const sectionHidden = document.getElementById('drones-body').classList.contains('is-hidden');

  if (count === 0) {
    stopCameras();
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  if (sectionHidden) { stopCameras(); return; }

  // Reconcile tiles: add new, remove gone
  const existing = new Map();
  for (const tile of grid.querySelectorAll('.cam-tile')) existing.set(tile.dataset.sid, tile);

  const seen = new Set();
  for (const [, d] of liveByBackendId) {
    seen.add(d.sourceId);
    if (existing.has(d.sourceId)) {
      // Update status dot
      const dot = existing.get(d.sourceId).querySelector('.cam-dot');
      if (dot) { dot.className = 'cam-dot ' + (d.online ? 'online' : 'offline'); }
      continue;
    }

    const tile = document.createElement('div');
    tile.className = 'cam-tile';
    tile.dataset.sid = d.sourceId;
    tile.title = d.label;
    tile.style.cursor = 'pointer';
    tile.addEventListener('click', () => map.panTo([d.lat, d.lng]));

    const img = document.createElement('img');
    img.src = `/api/swarm/${encodeURIComponent(d.sourceId)}/video.mjpg?t=${Date.now()}`;
    img.alt = d.label;
    img.onerror = () => {
      img.style.display = 'none';
      if (!tile.querySelector('.cam-no-signal')) {
        const ns = document.createElement('div');
        ns.className = 'cam-no-signal';
        ns.textContent = 'no signal';
        tile.insertBefore(ns, tile.firstChild);
      }
    };
    tile.appendChild(img);

    // Delete button (top-left)
    const del = document.createElement('button');
    del.className = 'cam-delete';
    del.textContent = '✕';
    del.title = 'Remove drone';
    del.addEventListener('click', (e) => { e.stopPropagation(); deleteDrone(d.sourceId); });
    tile.appendChild(del);

    // Expand → open this drone's live stream full-screen in the lightbox.
    const exp = document.createElement('button');
    exp.type = 'button';
    exp.className = 'cam-expand';
    exp.title = 'Expand live feed';
    exp.textContent = '⛶';
    exp.addEventListener('click', (e) => {
      e.stopPropagation();
      openLightbox(
        `/api/swarm/${encodeURIComponent(d.sourceId)}/video.mjpg?t=${Date.now()}`,
        `Live — ${d.label}`
      );
    });
    tile.appendChild(exp);

    const lbl = document.createElement('div');
    lbl.className = 'cam-label';
    lbl.innerHTML = `<span class="cam-dot ${d.online ? 'online' : 'offline'}"></span><span class="cam-name">${esc(d.label)}</span>`;
    tile.appendChild(lbl);

    grid.appendChild(tile);
  }

  for (const [sid, tile] of existing) {
    if (!seen.has(sid)) {
      const img = tile.querySelector('img');
      if (img) img.src = '';
      grid.removeChild(tile);
    }
  }
}

function stopCameras() {
  const grid = document.getElementById('drone-cameras');
  for (const img of grid.querySelectorAll('img')) img.src = '';
  grid.innerHTML = '';
}

// renderCameras is now just renderList — keep alias for toggle handler
function renderCameras() { renderList(); }

// ── Collapsible sections ──────────────────────────────────────────────────
function initToggle(toggleId, bodyId, onOpen) {
  const toggle = document.getElementById(toggleId);
  const body = document.getElementById(bodyId);
  toggle.addEventListener('click', () => {
    const nowHidden = body.classList.toggle('is-hidden');
    toggle.classList.toggle('is-collapsed', nowHidden);
    if (!nowHidden && onOpen) onOpen();
    if (nowHidden && bodyId === 'drones-body') stopCameras();
  });
}

initToggle('notif-toggle', 'notif-body', () => {
  document.getElementById('notif-badge').textContent = '';
});

initToggle('drones-toggle', 'drones-body', renderCameras);

// ── Detections ───────────────────────────────────────────────────────────
let unread = 0;
const detectionsById = new Map();     // det.id → det (metadata only, client cache)
const detectionMarkers = new Map();   // det.id → L.circleMarker (pins on the map)
// Auto-pin is the default. `unpinnedIds` tracks detections the operator
// explicitly unpinned in this session so that re-bootstraps (polling fallback,
// panel open) don't resurrect them. In-memory only — cleared on page refresh.
const unpinnedIds = new Set();

// Dedicated pane so detection pins sit above paths.
map.createPane('detectionsPane');
map.getPane('detectionsPane').style.zIndex = 500;

function fmtTime(tsMs) {
  const d = new Date(tsMs);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function showToast(det) {
  const stack = document.getElementById('toast-stack');
  if (!stack) return;
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML =
    `<span class="toast-drone">${esc(det.droneLabel || det.droneId)}</span>` +
    `<span class="toast-text">${esc(det.prompt)}</span>`;
  stack.appendChild(el);
  requestAnimationFrame(() => el.classList.add('is-visible'));
  setTimeout(() => {
    el.classList.remove('is-visible');
    setTimeout(() => el.remove(), 260);
  }, 2000);
}

function addDetection(det, opts) {
  if (!det || !det.id || detectionsById.has(det.id)) return;
  detectionsById.set(det.id, det);
  if (!opts || !opts.silent) showToast(det);

  // Compact list row.
  const empty = document.getElementById('notif-empty');
  if (empty) empty.remove();

  const badge = document.getElementById('notif-badge');
  const list = document.getElementById('notif-list');
  const notifBody = document.getElementById('notif-body');

  const li = document.createElement('li');
  li.className = 'notif-item is-alert';
  li.dataset.detId = det.id;
  const label = det.droneLabel || det.droneId;
  li.innerHTML = `<span class="notif-ts">${fmtTime(det.ts)}</span><span class="notif-drone">${esc(label)}</span><span class="notif-text">${esc(det.prompt)}</span>`;
  list.insertBefore(li, list.firstChild);
  while (list.children.length > 50) list.removeChild(list.lastChild);

  if (notifBody.classList.contains('is-hidden')) {
    unread++;
    badge.textContent = unread > 9 ? '9+' : String(unread);
  }

  // Append to the expanded panel if it's open.
  if (document.getElementById('detections-panel').classList.contains('is-open')) {
    prependDetCard(det);
  }
  // Auto-pin on the map unless the operator explicitly unpinned it earlier.
  if (!unpinnedIds.has(det.id)) {
    pinDetection(det);
  }
}
window.argusAddDetection = addDetection;

// Fetch server-side detection history and feed it through the same compact-list
// path as WS alerts. Runs on page load and when the panel opens so the list
// stays in sync even if the operator refreshes after detections already fired.
async function bootstrapDetections() {
  try {
    const res = await fetch('/api/detections');
    if (!res.ok) return;
    const data = await res.json();
    // Oldest first → newest ends up at the top of the list via prepends.
    const sorted = (data.detections || []).slice().sort((a, b) => a.ts - b.ts);
    for (const d of sorted) addDetection(d, { silent: true });
  } catch (_) { /* ignore; WS will fill in */ }
}

// ── Expanded panel ───────────────────────────────────────────────────────
function renderDetectionsPanel() {
  const body = document.getElementById('det-body');
  const empty = document.getElementById('det-empty');
  body.querySelectorAll('.det-card').forEach(c => c.remove());

  const all = Array.from(detectionsById.values()).sort((a, b) => b.ts - a.ts);
  document.getElementById('det-count').textContent = all.length;
  if (all.length === 0) { empty.style.display = ''; return; }
  empty.style.display = 'none';

  for (const det of all) body.appendChild(buildDetCard(det));
}

function prependDetCard(det) {
  const body = document.getElementById('det-body');
  const empty = document.getElementById('det-empty');
  empty.style.display = 'none';
  body.insertBefore(buildDetCard(det), body.children[1] || null);
  document.getElementById('det-count').textContent = detectionsById.size;
}

function buildDetCard(det) {
  const card = document.createElement('article');
  card.className = 'det-card';
  card.dataset.detId = det.id;

  const head = document.createElement('div');
  head.className = 'det-card-head';
  head.innerHTML = `
    <span class="det-card-drone">${esc(det.droneLabel || det.droneId)}</span>
    <span class="det-card-prompt">${esc(det.prompt)}</span>
    <span class="det-card-ts">${fmtTime(det.ts)}</span>
  `;
  card.appendChild(head);

  const imgWrap = document.createElement('div');
  imgWrap.className = 'det-card-image';
  if (det.has_image) {
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = `/api/detections/${encodeURIComponent(det.id)}/image.jpg`;
    img.alt = det.prompt;
    img.onerror = () => { imgWrap.textContent = 'Image evicted'; };
    imgWrap.appendChild(img);
  } else {
    imgWrap.textContent = 'Image evicted';
  }
  card.appendChild(imgWrap);

  const foot = document.createElement('div');
  foot.className = 'det-card-foot';
  const labelEl = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = detectionMarkers.has(det.id);
  cb.addEventListener('change', () => {
    if (cb.checked) pinDetection(det); else unpinDetection(det.id);
  });
  labelEl.appendChild(cb);
  labelEl.appendChild(document.createTextNode(' Pin to map'));
  foot.appendChild(labelEl);

  const coords = document.createElement('span');
  coords.className = 'det-card-coords';
  coords.textContent = `${det.lat.toFixed(5)}, ${det.lng.toFixed(5)}`;
  foot.appendChild(coords);

  card.appendChild(foot);
  return card;
}

function pinDetection(det) {
  if (detectionMarkers.has(det.id)) return;
  const marker = L.circleMarker([det.lat, det.lng], {
    pane: 'detectionsPane',
    radius: 7, color: '#fff', weight: 2,
    fillColor: '#f85149', fillOpacity: 1,
  }).addTo(map);

  // Rich hover tooltip with a small frame preview. Leaflet renders tooltips
  // lazily, so the <img> isn't fetched until the operator hovers the marker.
  const label = esc(det.droneLabel || det.droneId);
  const prompt = esc(det.prompt);
  const imgHtml = det.has_image
    ? `<img class="det-tip-img" src="/api/detections/${encodeURIComponent(det.id)}/image.jpg" alt="">`
    : '';
  marker.bindTooltip(
    `${imgHtml}<div class="det-tip-prompt">${prompt}</div><div class="det-tip-drone">${label}</div>`,
    { direction: 'top', offset: [0, -8], className: 'det-preview-tooltip', sticky: true, opacity: 1 }
  );
  // Clicking a marker opens the full-screen frame.
  marker.on('click', () => {
    if (det.has_image) {
      openLightbox(`/api/detections/${encodeURIComponent(det.id)}/image.jpg`,
                   `${det.droneLabel || det.droneId} — ${det.prompt}`);
    }
  });

  detectionMarkers.set(det.id, marker);
  unpinnedIds.delete(det.id);
}

function unpinDetection(detId) {
  const marker = detectionMarkers.get(detId);
  if (marker) { map.removeLayer(marker); detectionMarkers.delete(detId); }
  unpinnedIds.add(detId);
}

// ── Fullscreen lightbox ──────────────────────────────────────────────────
const lightboxEl = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxCap = document.getElementById('lightbox-caption');

function openLightbox(src, caption) {
  lightboxImg.src = src;
  lightboxCap.textContent = caption || '';
  lightboxEl.classList.add('is-open');
  lightboxEl.setAttribute('aria-hidden', 'false');
}
function closeLightbox() {
  lightboxEl.classList.remove('is-open');
  lightboxEl.setAttribute('aria-hidden', 'true');
  // Unset src so MJPEG streams actually stop (the browser keeps them alive
  // on display:none otherwise).
  lightboxImg.src = '';
}
lightboxEl.addEventListener('click', (e) => {
  // Backdrop click closes; clicks on the image/caption don't.
  if (e.target === lightboxEl) closeLightbox();
});
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && lightboxEl.classList.contains('is-open')) closeLightbox();
});

// Notification row → open the detection's frame full-screen.
document.getElementById('notif-list').addEventListener('click', (e) => {
  const li = e.target.closest('.notif-item');
  if (!li) return;
  const det = detectionsById.get(li.dataset.detId);
  if (!det) return;
  if (det.has_image) {
    openLightbox(
      `/api/detections/${encodeURIComponent(det.id)}/image.jpg`,
      `${det.droneLabel || det.droneId} — ${det.prompt}`
    );
  }
});

async function openDetectionsPanel() {
  // Pick up anything that landed since the last bootstrap (server may have
  // recorded detections while the panel was closed — or addDetection was
  // called for them already, in which case bootstrapDetections is a no-op).
  await bootstrapDetections();
  document.getElementById('map').style.display = 'none';
  document.getElementById('detections-panel').classList.add('is-open');
  renderDetectionsPanel();
}

function closeDetectionsPanel() {
  document.getElementById('detections-panel').classList.remove('is-open');
  document.getElementById('map').style.display = '';
  // Map tiles can mis-lay out after being hidden; nudge Leaflet.
  setTimeout(() => map.invalidateSize(), 50);
}

document.getElementById('notif-expand').addEventListener('click', (e) => {
  e.stopPropagation();
  openDetectionsPanel();
});
document.getElementById('det-close').addEventListener('click', closeDetectionsPanel);

// ── Prompt dispatch ───────────────────────────────────────────────────────
document.getElementById('btn-dispatch').addEventListener('click', () => {
  const prompt = document.getElementById('prompt-textarea').value.trim();
  if (!prompt) return;
  fetch('/api/prompt', {method: 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt})});
  console.log('Dispatch prompt:', prompt);
});

// ── Live sync ─────────────────────────────────────────────────────────────
let livePollHandle = null;
let liveWs = null;
let liveWsRetry = 1000;

async function fetchAndRender() {
  try {
    const res = await fetch('/api/drones');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    reconcileLive(data.drones || []);
  } catch (e) {
    console.warn('ARGUS poll failed:', e.message);
  }
}

function connectLiveWs() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  try { liveWs = new WebSocket(`${proto}://${location.host}/ws/drones`); } catch (_) { return; }
  liveWs.addEventListener('open', () => { liveWsRetry = 1000; });
  liveWs.addEventListener('message', (ev) => {
    let data;
    try { data = JSON.parse(ev.data); } catch (e) { console.warn('ws parse failed', e); return; }
    // Process alerts FIRST so a failure in reconcileLive cannot starve detections.
    try { (data.alerts || []).forEach(a => window.argusAddDetection(a)); }
    catch (e) { console.warn('alert dispatch failed', e); }
    try { reconcileLive(data.drones || []); }
    catch (e) { console.warn('reconcileLive failed', e); }
  });
  liveWs.addEventListener('close', () => { setTimeout(connectLiveWs, liveWsRetry); liveWsRetry = Math.min(liveWsRetry * 2, 10000); });
}

fetchAndRender();
livePollHandle = setInterval(fetchAndRender, 5000);
connectLiveWs();
bootstrapDetections();
// Safety net: poll detections in case WS drops or skips a tick. addDetection
// dedupes via detectionsById so this is idempotent and cheap.
setInterval(bootstrapDetections, 5000);


// ── Utility ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
</script>
</body>
</html>
