<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildBridge — Live Feed</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #8c97a3;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            overflow: hidden;
        }
        #wrap {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
        }
        #feed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #meta {
            position: absolute;
            left: 12px;
            top: 10px;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid #2a3240;
            border-radius: 999px;
            letter-spacing: 0.04em;
        }
        #meta.is-ok { color: #4ade80; border-color: rgba(74, 222, 128, 0.4); }
        #meta.is-warn { color: #f59e0b; border-color: rgba(245, 158, 11, 0.4); }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #2a3240;
            border-top-color: #3eb4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #placeholder {
            text-align: center;
            color: #8c97a3;
            position: absolute;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="placeholder"><div class="spinner"></div>waiting for first frame…</div>
        <img id="feed" alt="">
        <div id="meta">connecting…</div>
    </div>
    <script>
        (function () {
            const feed = document.getElementById('feed');
            const meta = document.getElementById('meta');
            const placeholder = document.getElementById('placeholder');

            feed.addEventListener('load', () => { placeholder.style.display = 'none'; }, { once: true });

            // MJPEG stream; browser decodes the multipart response automatically.
            feed.src = '/api/video.mjpg?t=' + Date.now();

            async function pollStatus() {
                try {
                    const r = await fetch('/api/video/status');
                    const s = await r.json();
                    if (s.connected) {
                        meta.textContent =
                            `${s.mode.toUpperCase()} · ${s.width}×${s.height} · ${s.fps.toFixed(1)} fps`;
                        meta.className = 'is-ok';
                    } else {
                        meta.textContent = `${s.mode.toUpperCase()} · disconnected — retrying…`;
                        meta.className = 'is-warn';
                    }
                } catch (e) {
                    meta.textContent = 'status fetch failed';
                    meta.className = 'is-warn';
                }
            }
            pollStatus();
            setInterval(pollStatus, 1500);
        })();
    </script>
</body>
</html>
